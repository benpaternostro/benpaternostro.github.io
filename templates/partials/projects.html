{% set resume = load_data(path="data/resume.toml") %}
<section class="section" aria-labelledby="projects-label">
  <h2 class="section-label" id="projects-label">
    <span class="section-num">03</span> Projects
  </h2>
  <dl class="rows rows--projects">
    {% for project in resume.projects %}
    <div class="row">
      <dt class="row-label">
        {% if project.url %}<a href="{{ project.url }}">{{ project.name }}</a>{% else %}{{ project.name }}{% endif %}
      </dt>
      <dd class="row-value">{{ project.summary }}</dd>
    </div>
    {% endfor %}
  </dl>
</section>
