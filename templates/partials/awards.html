{% set resume = load_data(path="data/resume.toml") %}
{% if resume.awards and resume.awards | length > 0 %}
<section class="section" aria-labelledby="awards-label">
  <h2 class="section-label" id="awards-label">
    <span class="section-num">05</span> Honors &amp; awards
  </h2>
  <ul class="award-list">
    {% for award in resume.awards %}
    <li>{{ award.title }}</li>
    {% endfor %}
  </ul>
</section>
{% endif %}
