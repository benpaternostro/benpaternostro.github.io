{% set resume = load_data(path="data/resume.toml") %}
<section class="section" aria-labelledby="education-label">
  <h2 class="section-label" id="education-label">
    <span class="section-num">04</span> Education
  </h2>
  {% for item in resume.education %}
  <article class="entry">
    <div class="entry-dates">{{ item.start_date }} — {{ item.end_date }}</div>
    <div class="entry-body">
      <h3 class="entry-role">{{ item.institution }}</h3>
      <p class="entry-org">{{ item.study_type }}, {{ item.area }}</p>
    </div>
  </article>
  {% endfor %}
</section>
