{% set resume = load_data(path="data/resume.toml") %}
<section class="section" aria-labelledby="skills-label">
  <h2 class="section-label" id="skills-label">
    <span class="section-num">02</span> Skills
  </h2>
  <dl class="rows">
    {% for skill in resume.skills %}
    <div class="row">
      <dt class="row-label">{{ skill.name }}</dt>
      <dd class="row-value">{{ skill.keywords | join(sep=", ") }}</dd>
    </div>
    {% endfor %}
  </dl>
</section>
